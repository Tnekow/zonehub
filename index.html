    <!-- Dynamic Canonical & Hreflang (SPA friendly) -->
    <script>
      (function() {
        try {
          const { origin } = window.location;
          // normalize path: remove trailing slash except root
          const normalize = (p) => (p !== '/' && p.endsWith('/') ? p.slice(0, -1) : p);
          const rawPath = window.location.pathname;
          const path = normalize(rawPath);
          const isEn = path === '/en' || path.startsWith('/en/');
          const zhPath = normalize(isEn ? path.replace(/^\/en/, '') || '/' : path);
          const enPath = normalize(isEn ? path : (path === '/' ? '/en' : '/en' + path));

          // update canonical
          let canonical = document.querySelector('link[rel="canonical"]');
          if (!canonical) {
            canonical = document.createElement('link');
            canonical.setAttribute('rel', 'canonical');
            document.head.appendChild(canonical);
          }
          canonical.setAttribute('href', origin + path);

          // update hreflang alternates
          const ensureAlt = (lang, href) => {
            let el = document.querySelector(`link[rel="alternate"][hreflang="${lang}"]`);
            if (!el) {
              el = document.createElement('link');
              el.setAttribute('rel', 'alternate');
              el.setAttribute('hreflang', lang);
              document.head.appendChild(el);
            }
            el.setAttribute('href', origin + href);
          };
          ensureAlt('zh-CN', zhPath);
          ensureAlt('en', enPath);
          // x-default 指向中文版本或根路径
          ensureAlt('x-default', zhPath);
        } catch (e) {
          console.warn('Failed to update canonical/hreflang:', e);
        }
      })();
    </script>
    
    <!-- COI Service Worker: 仅 video-to-gif 页面需要，按需加载 -->
    <script>
      (function() {
        var needIsolation = /artwork-showcase\/video-to-gif/.test(location.pathname);
        if (needIsolation) {
          window.coi = {
            shouldRegister: function() { return true; },
            shouldDeregister: function() { return false; },
            coepCredentialless: function() { return true; },
            coepDegrade: function() { return false; },
            quiet: false,
          };
          var s = document.createElement('script');
          s.src = '/coi-serviceworker.min.js';
          document.head.appendChild(s);
        } else if (navigator.serviceWorker) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) {
              if (r.active && r.active.scriptURL.includes('coi-serviceworker')) r.unregister();
            });
          });
        }
      })();
    </script>
