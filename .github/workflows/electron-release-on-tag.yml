name: Release Electron App on Tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v* tag to build and release (required for manual runs)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    env:
      NODE_VERSION: "22"
      HUSKY: "0"
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v ]]; then
            echo "Release tag must match v* (got: $TAG)."
            exit 1
          fi

          echo "value=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using release tag: $TAG"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ steps.release_tag.outputs.value }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Checkout uses the tagged commit, so do not rely on that commit's package.json scripts.
      # On CI + tag, electron-builder defaults to publishing and requires GH_TOKEN.
      # Release upload is handled by action-gh-release below.
      - name: Build and package
        run: |
          npm run build:electron
          npm run electron:prepare-icons
          npx electron-builder --publish never

      - name: Verify installer artifact
        shell: bash
        run: |
          shopt -s nullglob
          files=(dist/ZoneHub\ Setup\ *.exe)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No installer found under dist/. Contents:"
            ls -la dist || true
            exit 1
          fi
          printf 'Installer: %s\n' "${files[@]}"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.value }}
          name: ZoneHub ${{ steps.release_tag.outputs.value }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/ZoneHub Setup *.exe
