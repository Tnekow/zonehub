name: Package Electron App (Windows)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build (branch/tag/SHA)
        required: false
        default: ""

permissions:
  contents: read

jobs:
  package-windows:
    runs-on: windows-latest
    env:
      NODE_VERSION: "22"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run electron:build

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: zonehub-windows-installer
          path: |
            dist/ZoneHub Setup *.exe
            dist/ZoneHub Setup *.exe.blockmap
            dist/latest.yml
          if-no-files-found: error

      - name: Upload unpacked app (optional debug)
        uses: actions/upload-artifact@v4
        with:
          name: zonehub-win-unpacked
          path: dist/win-unpacked/**
          if-no-files-found: error
